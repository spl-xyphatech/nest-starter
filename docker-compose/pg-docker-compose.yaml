version: '3.9'
services:
  pg:
    image: docker.io/postgres:latest
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - PGDATA=/var/lib/postgresql/data/pgdata
    restart: always
    volumes:
      - postgres:/var/lib/postgresql/data/pgdata

  adminer:
    image: docker.io/adminer:latest
    ports:
      - 8088:8080
    depends_on:
      - pg

volumes:
  postgres:
